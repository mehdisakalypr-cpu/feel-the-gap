name: content-daily-generate

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        saas: [ftg, ofa, estate, aici, aiplb, ancf, hub]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run daily generation pipeline
        env:
          TARGET_SAAS: ${{ matrix.saas }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY_2: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_2 }}
          GOOGLE_GENERATIVE_AI_API_KEY_3: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_3 }}
          GOOGLE_GENERATIVE_AI_API_KEY_4: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY_4 }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          POLLINATIONS_TOKEN: ${{ secrets.POLLINATIONS_TOKEN }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: npx tsx scripts/content/daily-generate.ts
