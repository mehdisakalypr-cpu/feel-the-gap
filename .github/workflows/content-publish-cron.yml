name: content-publish-cron

on:
  schedule:
    - cron: '0 9 * * *'    # 09:00 UTC morning
    - cron: '0 17 * * *'   # 17:00 UTC evening
    - cron: '0 8 * * 1'    # Mon 08:00 UTC weekly analytics
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run publish pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          META_IG_ACCESS_TOKEN: ${{ secrets.META_IG_ACCESS_TOKEN }}
          META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}
          META_FB_PAGE_TOKEN: ${{ secrets.META_FB_PAGE_TOKEN }}
          META_FB_PAGE_ID: ${{ secrets.META_FB_PAGE_ID }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          YOUTUBE_ACCESS_TOKEN: ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
          TWITTER_OAUTH2_TOKEN: ${{ secrets.TWITTER_OAUTH2_TOKEN }}
        run: npx tsx scripts/content/publish-pending.ts
